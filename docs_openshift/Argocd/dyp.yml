apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/openshift-deployments
    path: manifests/
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
