apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: path-route
  annotations:
    description: "Route demonstrating path-based routing"
spec:
  host: example.com
  path: /api
  to:
    kind: Service
    name: api-service
    weight: 100
  port:
    targetPort: 8080
  wildcardPolicy: None
