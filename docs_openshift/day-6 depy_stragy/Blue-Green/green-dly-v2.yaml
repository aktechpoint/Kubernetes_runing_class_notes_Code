apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment-green-v2
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
      replica: green
  template:
    metadata:
      labels:
        app: java-app
        replica: green
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: green-container
        image: nginx:latest
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
