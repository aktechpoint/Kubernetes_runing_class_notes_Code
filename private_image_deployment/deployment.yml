apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-pod
  labels:
    app: student-class
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-class

  strategy:   # ✅ Correct position
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: student-class
    spec:
      containers:
      - name: student-container
        image: abhishek625/student-project
        imagePullPolicy: Always   # ✅ fixed
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: student-service
  labels:
    app: student-class
spec:
  type: NodePort
  selector:
    app: student-class
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30007