apiVersion: apps/v1
kind: Deployment
metadata:
  name: kundan-deployment
  labels:
    app: kundan-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kundan-app
  template:
    metadata:
      labels:
        app: kundan-app
    spec:
      containers:
        - name: nginx-container
          image: nginx:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service 
metadata:
  name: kundan-service
  labels:
    app: kundan-app
spec:
  type: NodePort
  ports:
    - port: 80
    # The port that will be exposed on each node in the cluster. This is the port that clients will use to access the service.
    # The port that will be exposed on each node in the cluster. This is the port that clients will use to access the service. It must be a value between 30000 and 32767.
      targetPort: 80
      protocol: TCP
      nodePort: 30080
      # The port that will be exposed on each node in the cluster. This is the port that clients will use to access the service. It must be a value between 30000 and 32767.
  selector:
    app: kundan-app