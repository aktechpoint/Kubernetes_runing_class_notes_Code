apiVersion: apps/v1
kind: Deployment
metadata:
  name: kundan-deployment
  labels:
    app: kundan-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kundan-app
  template:
    metadata:
      labels:
        app: kundan-app
    spec:
      containers:
        - name: nginx-container
          image: nginx:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: kundan-service
  labels:
    app: kundan-app
spec:
  type: ClusterIP
  selector:
    app: kundan-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP