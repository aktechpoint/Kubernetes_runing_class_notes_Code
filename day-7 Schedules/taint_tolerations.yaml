apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-taint-toleration-deployment
  labels:
    app: nginx
    value: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      value: frontend
  template:
    metadata:
      labels:
        app: nginx
        value: frontend
    spec:
      tolerations:
      - key: "clr"
        operator: "Equal"
        value: "blue"
        effect: "NoSchedule"
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80