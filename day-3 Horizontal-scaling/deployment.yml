apiVersion: apps/v1
kind: Deployment
metadata:
  name: kundan-hpa
  namespace: kundan-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kundan-app
  template:
    metadata:
      labels:
        app: kundan-app
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"