---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-pod
  namespace: default
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-container
          image: nginx:latest
          imagePullPolicy: Always
          ports:
            - name: http
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: java-service
  namespace: default  
spec:
  type: LoadBalancer  
  selector:
    app: java-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

